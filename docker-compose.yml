version: '3.8'

services:
  video-detection:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-video-detection
    
    # GPU support (uncomment if using NVIDIA GPU)
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    #   - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    
    # CPU-only mode (comment out GPU lines above and use this)
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - MODEL_DEVICE=cpu
    
    volumes:
      # Mount data directory for persistent model storage
      - ./data:/app/data
      # Mount logs directory
      - ./logs:/app/logs
      # Mount video files if processing from file
      - ./data/videos:/app/data/videos
    
    ports:
      - "8000:8000"
    
    # For webcam access (Linux)
    # devices:
    #   - /dev/video0:/dev/video0
    
    restart: unless-stopped
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Redis for caching and message queue
  # redis:
  #   image: redis:7-alpine
  #   container_name: detection-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped

volumes:
  redis-data:
    driver: local
